name: Firebase CI/CD

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Backend Dependencies
        run: |
          cd backend/functions
          npm install

      - name: Deploy to DEV
        if: github.ref == 'refs/heads/dev'
        run: firebase deploy --project swami-math-dev --token "${{ secrets.FIREBASE_TOKEN }}"
      - name: Deploy to STAGING
        if: github.ref == 'refs/heads/staging'
        run: firebase deploy --project swami-math-staging --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy to PROD
        if: github.ref == 'refs/heads/main'
        run: firebase deploy --project swami-math-prod --token "${{ secrets.FIREBASE_TOKEN }}"